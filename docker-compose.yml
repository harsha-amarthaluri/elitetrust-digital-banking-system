version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bank_postgres
    restart: always
    environment:
      POSTGRES_DB: bank_database
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Harsha@123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bank_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: bank_backend
    restart: always
    ports:
      - "9090:9090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/bank_database
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Harsha@123
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: bank_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:9090
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.44.0
    container_name: bank_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9095:9090"

  grafana:
    image: grafana/grafana:9.5.2
    container_name: bank_grafana
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
